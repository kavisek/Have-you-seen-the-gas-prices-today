version: 1
disable_existing_loggers: false
formatters:
  color:
    (): colorlog.ColoredFormatter
    format: "%(log_color)s%(cyan)s%(asctime)s %(levelname)s%(reset)s:  %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
    log_colors:
      DEBUG: white
      INFO: cyan
      WARNING: yellow
      ERROR: red
      CRITICAL: bold_red
handlers:
  default:
    class: logging.StreamHandler
    formatter: color
    stream: ext://sys.stdout
loggers:
  uvicorn:
    handlers: [default]
    level: INFO
  uvicorn.error:
    handlers: [default]
    level: INFO
    propagate: true
  uvicorn.access:
    handlers: [default]
    level: INFO
    propagate: true
root:
  handlers: [default]
  level: INFO
